<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Shopsy Update Product</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/update.css">
    </head>

    <body>

        <!--Navbar -->
        <header>
            <div class="logo">
                Shopsy
            </div>

            <nav>
                <ul>
                    <li><a href="./home.html">Home</a></li>
                    <li><a href="./add-product.html">Add Product</a></li>
                    <li><a href="./cart.html">Cart</a></li>
                    <li><a href="./orders.html">Orders</a></li>
                </ul>
            </nav>
        </header>

        <!-- FORM -->
        <section class="form-section">

            <div class="form-card">

                <div class="title">
                    <h1>Make Changes in Existing Product</h1>
                </div>

                <form id="productForm">

                    <div class="input-group1">
                        <div class="field">
                            <label>Product Name</label>
                            <input type="text" id="name" class="name" required>
                        </div>

                        <div class="field">
                            <label>Price</label>
                            <input type="number" id="price" class="price" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Category</label>
                        <input type="text" id="category" required>
                    </div>

                    <div class="input-group">
                        <label>Description</label>
                        <textarea id="description" rows="4" required></textarea>
                    </div>

                    <div class="input-group">
                        <label>Product Image</label>
                        <input type="url" id="image" required>
                    </div>

                    <button type="submit" class="save-btn">
                        Save Changes
                    </button>

                </form>

            </div>

        </section>

        <script src="../js/update-product.js"></script>
    </body>

</html>
